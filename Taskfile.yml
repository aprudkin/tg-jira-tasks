version: '3'

vars:
  REPO_ROOT:
    sh: git rev-parse --show-toplevel

includes:
  docker:
    taskfile: .tasks.d/docker.yml
    optional: false

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list-all

  init:
    desc: Initialize development environment
    cmds:
      - task: docker:build
      - task: docker:up
      - echo "Bot stack is ready."

  status:
    desc: Show status of the bot stack
    cmds:
      - echo "=== 🐳 Контейнеры ==="
      - task: docker:ps
      - echo ""
      - echo "=== 📊 Использование ресурсов ==="
      - 'docker compose stats --no-stream --format "table {{ "{{" }}.Name{{ "}}" }}\t{{ "{{" }}.CPUPerc{{ "}}" }}\t{{ "{{" }}.MemUsage{{ "}}" }}\t{{ "{{" }}.NetIO{{ "}}" }}" 2>/dev/null || echo "Контейнеры не запущены"'
      - echo ""
      - echo "=== 💾 Volumes ==="
      - 'docker volume ls --filter name=tg-jira-tasks --format "table {{ "{{" }}.Name{{ "}}" }}\t{{ "{{" }}.Driver{{ "}}" }}"'
      - echo ""
      - echo "=== 📦 Образы ==="
      - docker compose images --format table
